services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/zesttoeic
      SPRING_DATASOURCE_URL: jdbc:postgresql://pg:5432/zesttoeic
      SPRING_DATASOURCE_USERNAME: zest
      SPRING_DATASOURCE_PASSWORD: zest_secret
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbit
      JWT_SECRET: zesttoeic-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    depends_on:
      mongo:
        condition: service_started
      pg:
        condition: service_healthy
      redis:
        condition: service_started
      rabbit:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  pg:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: zesttoeic
      POSTGRES_USER: zest
      POSTGRES_PASSWORD: zest_secret
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zest -d zesttoeic"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru

  rabbit:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongo-data:
  pg-data:
