# Test profile — MongoDB + PostgreSQL + Redis + RabbitMQ
spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/zesttoeic_test
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/zesttoeic_test
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:14062003}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  rabbitmq:
    host: localhost
    port: 5672
  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

ai:
  gemini:
    api-key: test-dummy-key
    model: gemini-2.0-flash

vnpay:
  tmn-code: TEST_TMN
  hash-secret: TEST_HASH_SECRET
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

logging:
  level:
    com.zest.toeic: WARN
