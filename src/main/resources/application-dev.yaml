server:
  port: 8080

spring:
  # ═══════ MongoDB (Localhost) ═══════
  data:
    mongodb:
      uri: mongodb://localhost:27017/zesttoeic?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      timeout: 5s

  # ═══════ PostgreSQL (Localhost) ═══════
  datasource:
    url: jdbc:postgresql://localhost:5433/zesttoeic #docker
    username: ${POSTGRES_USER:zest} #docker
    password: ${POSTGRES_PASSWORD:zest_secret} #docker
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ═══════ RabbitMQ (Localhost) ═══════
  rabbitmq:
    host: localhost
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    connection-timeout: 5000

  # ═══════ Email ═══════
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ═══════ Logging (Dev = DEBUG) ═══════
logging:
  level:
    com.zest.toeic: DEBUG
    org.springframework.data.mongodb: WARN
    org.springframework.security: WARN

vnpay:
  return-url: http://localhost:8080/api/v1/payment/vnpay-return
