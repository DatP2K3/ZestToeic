server:
  port: 8080

spring:
  # ═══════ MongoDB (Docker Network) ═══════
  data:
    mongodb:
      uri: mongodb://mongo:27017/zesttoeic?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000
    redis:
      host: redis
      port: ${REDIS_PORT:6379}
      timeout: 5s

  # ═══════ PostgreSQL (Docker Network) ═══════
  datasource:
    url: jdbc:postgresql://pg:5432/zesttoeic
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # ═══════ RabbitMQ (Docker Network) ═══════
  rabbitmq:
    host: rabbit
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: 5000

  # ═══════ Email ═══════
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# ═══════ Logging (Prod = INFO) ═══════
logging:
  level:
    com.zest.toeic: INFO
    org.springframework.data.mongodb: WARN
    org.springframework.security: WARN

vnpay:
  return-url: ${VNPAY_RETURN_URL_PROD}
