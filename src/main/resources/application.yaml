server:
  port: 8080

spring:
  application:
    name: zesttoeic-api

  # ═══════ MongoDB (Primary DB) ═══════
  data:
    mongodb:
      uri: mongodb://localhost:27017/zesttoeic
    redis:
      host: localhost
      port: 6379

  # ═══════ PostgreSQL (ACID - Payments/Audit) ═══════
  datasource:
    url: jdbc:postgresql://localhost:5433/zesttoeic
    username: zest
    password: zest_secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ═══════ RabbitMQ ═══════
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# ═══════ JWT Configuration ═══════
jwt:
  secret: zesttoeic-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 900000      # 15 minutes (ms)
  refresh-token-expiration: 604800000  # 7 days (ms)

# ═══════ API Documentation ═══════
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# ═══════ Actuator ═══════
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ═══════ Logging ═══════
logging:
  level:
    com.zest.toeic: DEBUG
    org.springframework.data.mongodb: WARN
    org.springframework.security: WARN
